<!DOCTYPE html>
<html>
    <head>
        <link rel="stylesheet" href="/static/css/styles.css" />
    </head>
    <body>
        <div class="hero">
            <div>Bruce Bochy has <span class="important">{{ wins }}</span> wins</div>
            <div class="trophies">{{ "\U0001f3c6" * championships.giants }}</div>
        </div>
    </body>
    <footer class="minor">
        <div>last refreshed: {{ revised }}</div>
        <div class="theme-switcher">
            <span class="theme-swatch" data-theme="padres" title="San Diego Padres"></span>
            <span class="theme-swatch" data-theme="giants" title="San Francisco Giants"></span>
            <span class="theme-swatch" data-theme="rangers" title="Texas Rangers"></span>
        </div>
    </footer>
    <script>
        (function() {
            var championships = {"giants": {{ championships.giants }}, "padres": {{ championships.padres }}, "rangers": {{ championships.rangers }}};
            var trophy = "\uD83C\uDFC6";

            function updateTrophies(team) {
                var count = championships[team] || 0;
                var el = document.querySelector(".trophies");
                el.textContent = trophy.repeat(count);
            }

            var theme = localStorage.getItem("theme") || "giants";
            document.documentElement.setAttribute("data-theme", theme);
            updateTrophies(theme);

            document.querySelectorAll(".theme-swatch").forEach(function(swatch) {
                if (swatch.dataset.theme === theme) swatch.classList.add("active");
                swatch.addEventListener("click", function() {
                    var t = this.dataset.theme;
                    document.documentElement.setAttribute("data-theme", t);
                    localStorage.setItem("theme", t);
                    updateTrophies(t);
                    document.querySelectorAll(".theme-swatch").forEach(function(s) {
                        s.classList.toggle("active", s.dataset.theme === t);
                    });
                });
            });
        })();
    </script>
</html>
